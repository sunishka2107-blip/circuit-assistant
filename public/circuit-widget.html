<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nova — Electrical Sales Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #16181c;
    --panel: #1e2126;
    --panel-2: #24272d;
    --line: #34383f;
    --text: #eceef1;
    --muted: #8b929e;
    --amber: #e8a33d;
    --amber-dim: #6b5327;
    --teal: #4fd1c5;
    --teal-dim: #234846;
    --danger: #d9614f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:
      linear-gradient(var(--bg), var(--bg)),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 24px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 24px);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  header{
    padding:18px 28px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .brand .mark{
    width:34px;height:34px;border-radius:6px;
    background:var(--panel-2);border:1px solid var(--amber);
    display:flex;align-items:center;justify-content:center;
    font-family:'IBM Plex Mono',monospace;color:var(--amber);font-size:13px;font-weight:500;
  }
  .brand h1{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:700;font-size:26px;letter-spacing:0.5px;margin:0;
    text-transform:uppercase;
  }
  .brand .tag{
    font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);
    border-left:1px solid var(--line);padding-left:12px;margin-left:2px;
  }
  select#langSelect{
    background:var(--panel-2);color:var(--text);border:1px solid var(--line);
    border-radius:4px;padding:6px 10px;font-family:'IBM Plex Mono',monospace;font-size:12px;
  }
  main{
    flex:1;display:flex;flex-direction:column;background:var(--bg);
    min-height:0;max-width:760px;margin:0 auto;width:100%;
  }

  .chat-col{background:var(--bg);display:flex;flex-direction:column;min-height:0;flex:1;}

  .col-label{
    font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);
    text-transform:uppercase;letter-spacing:1px;padding:14px 20px 8px;
  }

  #messages{flex:1;overflow-y:auto;padding:6px 20px 12px;display:flex;flex-direction:column;gap:12px;}
  .msg{max-width:78%;padding:10px 14px;border-radius:10px;font-size:14.5px;line-height:1.5;}
  .msg.user{align-self:flex-end;background:var(--amber-dim);border:1px solid var(--amber);color:#fbe6c4;}
  .msg.assistant{align-self:flex-start;background:var(--panel);border:1px solid var(--line);}
  .msg.system{align-self:center;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:12px;background:none;}
  .msg .meta{display:block;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;}

  .voice-orb-row{
    display:flex;align-items:center;gap:16px;padding:16px 20px;border-top:1px solid var(--line);
  }
  #orb{
    width:56px;height:56px;border-radius:50%;flex-shrink:0;position:relative;cursor:pointer;
    background:radial-gradient(circle at 35% 30%, #3a3d43, #202226);
    border:2px solid var(--amber-dim);
    display:flex;align-items:center;justify-content:center;
    transition:border-color .2s, box-shadow .2s;
  }
  #orb svg{width:22px;height:22px;fill:var(--amber);}
  #orb.listening{border-color:var(--teal);box-shadow:0 0 0 6px rgba(79,209,197,0.12);animation:pulse 1.1s ease-in-out infinite;}
  #orb.thinking{border-color:var(--amber);animation:spin 1s linear infinite;}
  #orb.speaking{border-color:var(--teal);box-shadow:0 0 0 6px rgba(79,209,197,0.18);}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(79,209,197,0.10);}50%{box-shadow:0 0 0 10px rgba(79,209,197,0.20);}}
  @keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}

  .waveform{display:flex;align-items:center;gap:3px;height:24px;}
  .waveform span{width:3px;background:var(--teal);border-radius:2px;height:6px;opacity:0.35;}
  .waveform.active span{animation:bar 0.9s ease-in-out infinite;opacity:1;}
  .waveform span:nth-child(1){animation-delay:0s;}
  .waveform span:nth-child(2){animation-delay:0.1s;}
  .waveform span:nth-child(3){animation-delay:0.2s;}
  .waveform span:nth-child(4){animation-delay:0.3s;}
  .waveform span:nth-child(5){animation-delay:0.4s;}
  @keyframes bar{0%,100%{height:6px;}50%{height:22px;}}

  .status-text{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);flex:1;}

  .text-input-row{display:flex;gap:8px;padding:0 20px 16px;}
  #textInput{
    flex:1;background:var(--panel);border:1px solid var(--line);color:var(--text);
    border-radius:6px;padding:10px 12px;font-family:'Inter',sans-serif;font-size:14px;
  }
  #sendBtn{
    background:var(--amber);border:none;color:#1a1300;font-weight:600;padding:0 18px;
    border-radius:6px;cursor:pointer;font-family:'Inter',sans-serif;
  }
  #sendBtn:disabled{opacity:0.5;cursor:default;}

  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="mark">⏚</div>
    <h1>Nova</h1>
    <span class="tag">ELECTRICAL SALES ASSISTANT</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <select id="langSelect" title="Voice input language — Nova still replies in whatever language you speak or type"></select>
    <button id="closeBtn" title="Close" style="display:none;background:none;border:1px solid var(--line);color:var(--muted);width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:14px;line-height:1;">✕</button>
  </div>
</header>

<main>
  <div class="chat-col">
    <div class="col-label">Conversation</div>
    <div id="messages"></div>
    <div class="voice-orb-row">
      <div id="orb" title="Tap to talk">
        <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>
      </div>
      <div class="waveform" id="waveform">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <div class="status-text" id="statusText">Tap the mic or type below to start.</div>
    </div>
    <div class="text-input-row">
      <input id="textInput" type="text" placeholder="Ask about wiring, breakers, lighting, panels…">
      <button id="sendBtn">Send</button>
    </div>
  </div>
</main>

<script>
// ---------- Product catalog ----------
const CATALOG = [
  {id:"LED-A19-9W", name:"LED Bulb A19 9W Warm White", category:"Lighting", price:3.49, unit:"each", specs:"800 lumens, E26 base, dimmable"},
  {id:"LED-PAR38-15W", name:"LED Flood Light PAR38 15W", category:"Lighting", price:8.99, unit:"each", specs:"1200 lumens, outdoor rated IP65"},
  {id:"LED-PANEL-2x4", name:"LED Troffer Panel 2x4ft 40W", category:"Lighting", price:34.99, unit:"each", specs:"4000 lumens, drop-ceiling"},
  {id:"WIRE-12AWG-THHN", name:"12 AWG THHN Copper Wire", category:"Wiring & Cable", price:0.42, unit:"ft", specs:"600V, solid, for 20A circuits"},
  {id:"WIRE-14AWG-NM", name:"14/2 NM-B Romex Cable", category:"Wiring & Cable", price:0.55, unit:"ft", specs:"15A circuits, indoor residential"},
  {id:"CABLE-CAT6", name:"Cat6 Ethernet Cable", category:"Wiring & Cable", price:0.28, unit:"ft", specs:"550MHz, plenum-rated available"},
  {id:"SW-SP-15A", name:"Single Pole Switch 15A", category:"Switches & Outlets", price:2.19, unit:"each", specs:"Standard toggle, 120/277V"},
  {id:"SW-3WAY-15A", name:"3-Way Switch 15A", category:"Switches & Outlets", price:3.49, unit:"each", specs:"For stairwell/hallway circuits"},
  {id:"OUT-GFCI-20A", name:"GFCI Outlet 20A", category:"Switches & Outlets", price:14.99, unit:"each", specs:"Ground fault protection, weather-resistant"},
  {id:"OUT-USB-C", name:"USB-C Charging Outlet", category:"Switches & Outlets", price:19.99, unit:"each", specs:"20W fast charge + standard receptacle"},
  {id:"BRK-1P-20A", name:"Single Pole Breaker 20A", category:"Circuit Protection", price:6.49, unit:"each", specs:"Fits QO/Homeline panels"},
  {id:"BRK-2P-30A", name:"Double Pole Breaker 30A", category:"Circuit Protection", price:18.99, unit:"each", specs:"For dryers, AC units"},
  {id:"AFCI-1P-15A", name:"AFCI/CAFCI Combo Breaker 15A", category:"Circuit Protection", price:42.99, unit:"each", specs:"Arc-fault protection, code required"},
  {id:"PANEL-100A", name:"100A Main Breaker Panel, 20-space", category:"Panels & Boards", price:89.99, unit:"each", specs:"Indoor rated, includes main breaker"},
  {id:"PANEL-200A", name:"200A Main Breaker Panel, 40-space", category:"Panels & Boards", price:164.99, unit:"each", specs:"Standard residential service"},
  {id:"SMART-SW-WIFI", name:"Smart Wi-Fi Dimmer Switch", category:"Smart Home", price:24.99, unit:"each", specs:"App + voice control, no hub needed"},
  {id:"SMART-PLUG", name:"Smart Plug Outdoor", category:"Smart Home", price:16.99, unit:"each", specs:"Wi-Fi controlled, IP65 weatherproof"},
  {id:"TOOL-VOLT-TESTER", name:"Non-Contact Voltage Tester", category:"Tools & Safety", price:12.99, unit:"each", specs:"Audible + visual alert, CAT III"},
];

// ---------- Language options for voice input ----------
const LANGS = [
  ["auto","Auto (browser default)"],["en-US","English"],["es-ES","Español"],["fr-FR","Français"],
  ["de-DE","Deutsch"],["pt-BR","Português"],["it-IT","Italiano"],["hi-IN","हिन्दी"],
  ["zh-CN","中文"],["ja-JP","日本語"],["ko-KR","한국어"],["ar-SA","العربية"],
  ["ru-RU","Русский"],["nl-NL","Nederlands"],["tr-TR","Türkçe"],["vi-VN","Tiếng Việt"]
];
const langSelect = document.getElementById('langSelect');
LANGS.forEach(([code,label])=>{
  const o=document.createElement('option'); o.value=code; o.textContent=label; langSelect.appendChild(o);
});
langSelect.value = "auto";

// ---------- State ----------
let history = []; // {role:'user'|'assistant', content: text}
let lastDetectedLang = "en";

const messagesEl = document.getElementById('messages');
const orb = document.getElementById('orb');
const waveform = document.getElementById('waveform');
const statusText = document.getElementById('statusText');
const textInput = document.getElementById('textInput');
const sendBtn = document.getElementById('sendBtn');

function addMessage(role, text){
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  if(role !== 'system'){
    const meta = document.createElement('span');
    meta.className='meta';
    meta.textContent = role === 'user' ? 'You' : 'Nova';
    div.appendChild(meta);
  }
  const body = document.createElement('div');
  body.textContent = text;
  div.appendChild(body);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// ---------- Text-to-speech ----------
let voicesCache = [];
function loadVoices(){ voicesCache = window.speechSynthesis ? window.speechSynthesis.getVoices() : []; }
if('speechSynthesis' in window){
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
}
function pickVoice(langCode){
  if(!langCode) return null;
  const base = langCode.split('-')[0].toLowerCase();
  return voicesCache.find(v=>v.lang.toLowerCase().startsWith(base)) ||
         voicesCache.find(v=>v.lang.toLowerCase().startsWith(base.slice(0,2))) || null;
}
function speak(text, langCode){
  if(!('speechSynthesis' in window)){
    restartListeningIfActive();
    return;
  }
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  const voice = pickVoice(langCode);
  if(voice) utter.voice = voice;
  utter.lang = langCode || 'en-US';
  utter.onstart = ()=>{ setOrbState('speaking'); };
  utter.onend = ()=>{ setOrbState('idle'); restartListeningIfActive(); };
  window.speechSynthesis.speak(utter);
}

function restartListeningIfActive(){
  // Continues the hands-free loop after Nova finishes speaking, unless the
  // session was ended (manual stop, "done"/"okay", or a mic error).
  if(!voiceSessionActive || !recognizer || isListening) return;
  setTimeout(()=>{
    if(!voiceSessionActive || isListening) return;
    try{ recognizer.start(); }catch(e){ /* already started */ }
  }, 400);
}

function setOrbState(state){
  orb.classList.remove('listening','thinking','speaking');
  waveform.classList.remove('active');
  if(state === 'listening'){ orb.classList.add('listening'); statusText.textContent = 'Listening…'; }
  else if(state === 'thinking'){ orb.classList.add('thinking'); statusText.textContent = 'Nova is thinking…'; }
  else if(state === 'speaking'){ orb.classList.add('speaking'); waveform.classList.add('active'); statusText.textContent = 'Nova is speaking…'; }
  else { statusText.textContent = 'Tap the mic or type below to start.'; }
}

// ---------- Speech recognition ----------
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognizer = null;
let isListening = false;
let voiceSessionActive = false; // true while in a hands-free continuous voice loop

// Phrases that end the hands-free loop instead of being sent to Nova as a
// question. Checked against the whole trimmed transcript, case-insensitive,
// with trailing punctuation ignored — so "Okay.", "done", "That's all" all match.
const STOP_PHRASES = [
  'done', 'ok', 'okay', "that's all", 'thats all', "that's it", 'thats it',
  'stop', 'stop listening', "i'm done", 'im done', 'no thanks', 'nothing else'
];
function isStopPhrase(transcript){
  const cleaned = transcript.trim().toLowerCase().replace(/[.!?]+$/, '');
  return STOP_PHRASES.includes(cleaned);
}

if(SpeechRecognition){
  recognizer = new SpeechRecognition();
  recognizer.continuous = false;
  recognizer.interimResults = false;
  recognizer.maxAlternatives = 1;

  recognizer.onstart = ()=>{ isListening = true; setOrbState('listening'); };
  recognizer.onerror = (e)=>{
    isListening = false;
    voiceSessionActive = false; // don't keep retrying forever on repeated errors
    setOrbState('idle');
    addMessage('system', 'Mic error: ' + e.error + ' — you can type instead.');
  };
  recognizer.onend = ()=>{ isListening = false; if(orb.classList.contains('listening')) setOrbState('idle'); };
  recognizer.onresult = (event)=>{
    const transcript = event.results[0][0].transcript;
    if(isStopPhrase(transcript)){
      voiceSessionActive = false;
      addMessage('system', 'Okay — ended the voice session. Tap the mic anytime to start again.');
      setOrbState('idle');
      return;
    }
    handleUserInput(transcript);
  };
} else {
  statusText.textContent = 'Voice input not supported in this browser — please type below.';
}

orb.addEventListener('click', ()=>{
  if(!recognizer){ textInput.focus(); return; }
  if(isListening){
    voiceSessionActive = false; // manual stop also ends the hands-free loop
    recognizer.stop();
    return;
  }
  voiceSessionActive = true;
  const chosen = langSelect.value;
  recognizer.lang = chosen === 'auto' ? (navigator.language || 'en-US') : chosen;
  try{ recognizer.start(); }catch(e){ /* already started */ }
});

sendBtn.addEventListener('click', ()=>{
  const val = textInput.value.trim();
  if(!val) return;
  textInput.value = '';
  voiceSessionActive = false; // switching to typing ends any hands-free voice loop
  handleUserInput(val);
});
textInput.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter') sendBtn.click();
});

// ---------- Claude API call ----------
function buildSystemPrompt(){
  return `You are Nova, a knowledgeable, friendly multilingual voice assistant for an electrical supply store.

PRODUCT CATALOG (JSON):
${JSON.stringify(CATALOG)}

Your job:
1. Detect the language of the user's LATEST message, independent of prior turns. Respond ENTIRELY in that language (including product names/specs, translated naturally).
2. Answer product questions using ONLY the catalog above (specs, pricing, compatibility, basic safety/code notes). If something isn't in the catalog, say so honestly and suggest the closest available item.
3. Proactively recommend suitable products when the user describes a need (e.g. "I need to wire a bedroom outlet" -> suggest wire gauge, outlet, breaker), mentioning names and prices conversationally in your reply.
4. Keep replies conversational and concise, since they'll often be read aloud — avoid long bullet lists.
5. Never give electrical safety-critical instructions that would require a licensed electrician to perform (e.g. panel wiring steps) — recommend consulting a licensed electrician for installation, while still being helpful about product selection.

Respond with STRICT JSON ONLY, no markdown fences, no commentary outside the JSON, matching exactly this schema:
{"detected_language": "BCP-47 code like en-US, es-ES, fr-FR", "language_name": "English name of the language", "reply": "assistant reply text, entirely in detected_language"}`;
}

async function callClaude(userText){
  const contents = [
    ...history.map(h => ({ role: h.role === 'assistant' ? 'model' : 'user', parts: [{ text: h.content }] })),
    { role: 'user', parts: [{ text: userText }] }
  ];
  const response = await fetch("/api/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      contents: contents,
      systemInstruction: { parts: [{ text: buildSystemPrompt() }] },
      generationConfig: { maxOutputTokens: 1000 }
    })
  });
  const data = await response.json();
  const candidate = data.candidates && data.candidates[0];
  const textPart = candidate && candidate.content && candidate.content.parts &&
    candidate.content.parts.find(p => p.text);
  if(!textPart) throw new Error('No response from model' + (data.error ? (': ' + data.error.message) : ''));
  let cleaned = textPart.text.trim().replace(/^```json/i,'').replace(/^```/,'').replace(/```$/,'').trim();
  return JSON.parse(cleaned);
}

async function handleUserInput(text){
  addMessage('user', text);
  history.push({role:'user', content:text});
  setOrbState('thinking');
  sendBtn.disabled = true;
  try{
    const result = await callClaude(text);
    lastDetectedLang = result.detected_language || 'en-US';
    addMessage('assistant', result.reply || '(no reply)');
    history.push({role:'assistant', content: result.reply || ''});
    speak(result.reply || '', lastDetectedLang);
  }catch(err){
    console.error(err);
    addMessage('system', 'Something went wrong talking to Nova: ' + err.message);
    setOrbState('idle');
  }finally{
    sendBtn.disabled = false;
  }
}

// ---------- Embedded mode (iframe integration) ----------
if(window.self !== window.top){
  const closeBtn = document.getElementById('closeBtn');
  closeBtn.style.display = 'flex';
  closeBtn.style.alignItems = 'center';
  closeBtn.style.justifyContent = 'center';
  closeBtn.addEventListener('click', ()=>{
    window.parent.postMessage({type:'circuit-close'}, '*');
  });
}

// Welcome message
addMessage('assistant', "Hi, I'm Nova — your electrical products assistant. Ask me anything about wiring, breakers, lighting, panels, or smart home devices, in any language. Tap the mic to talk hands-free — I'll keep listening after each reply until you say \"done\" or \"okay,\" or tap the mic again.");
</script>
</body>
</html>
